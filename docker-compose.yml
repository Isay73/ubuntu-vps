version: "3.9"

services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: CHANGE_ME
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - nextcloud_net

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: CHANGE_ME
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nextcloud_net

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - nextcloud_net

volumes:
  nextcloud_data:
  postgres_data:

networks:
  nextcloud_net:
    driver: bridge
